<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — DevArch</title>

  <!-- Styles -->
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../components/navbar/navbar.css" />
  <link rel="stylesheet" href="./article.css" />

  <!-- Scripts -->
  <script type="module" src="../../scripts/main.js"></script>
  <script type="module" src="../../scripts/article/article.js"></script>

</head>
<body>
  <div id="navbar-mount"></div>

  <div class="article-layout">
    <main class="article-main" id="articleMain">
      <!-- Loading -->
      <div class="article-skeleton" id="articleSkeleton">
        <div class="skeleton skeleton--line" style="width:30%; height:18px"></div>
        <div class="skeleton skeleton--title" style="height:48px; width:85%; margin-top:12px"></div>
        <div class="skeleton skeleton--line" style="width:50%; height:14px; margin-top:8px"></div>
        <div class="skeleton skeleton--img" style="height:400px; border-radius:16px; margin-top:24px"></div>
        <div style="margin-top:24px; display:flex; flex-direction:column; gap:10px">
          <div class="skeleton skeleton--line" style="width:100%"></div>
          <div class="skeleton skeleton--line" style="width:95%"></div>
          <div class="skeleton skeleton--line" style="width:88%"></div>
          <div class="skeleton skeleton--line" style="width:92%"></div>
        </div>
      </div>

      <!-- Content -->
      <article class="article" id="articleContent" style="display:none">
        <div class="article__breadcrumb">
          <a href="../home/home.html">Home</a>
          <span>/</span>
          <span id="articleBreadCat"></span>
        </div>
        <span class="badge badge--red article__badge" id="articleBadge"></span>
        <h1 class="article__title" id="articleTitle"></h1>
        <div class="article__byline">
          <div class="article__author-avatar" id="articleAuthorAvatar"></div>
          <div>
            <p class="article__author-name" id="articleAuthorName"></p>
            <p class="article__date" id="articleDate"></p>
          </div>
          <div class="article__stats" id="articleStats"></div>
        </div>
        <div class="article__actions" id="articleActions"></div>
        <figure class="article__cover">
          <img id="articleCoverImg" src="" alt="" />
        </figure>
        <div class="article__body prose" id="articleBody"></div>

        <!-- Author card -->
        <div class="article__author-card" id="authorCard">
          <div class="article__author-card-avatar" id="authorCardAvatar"></div>
          <div>
            <p class="article__author-card-label">Written by</p>
            <p class="article__author-card-name" id="authorCardName"></p>
          </div>
        </div>
      </article>

      <!-- Error -->
      <div class="error-state" id="articleError" style="display:none">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p>Article not found.</p>
        <a href="../home/home.html" class="btn btn--primary btn--sm">Back to home</a>
      </div>
    </main>

    <!-- Sticky aside -->
    <aside class="article-aside">
      <div class="article-aside__sticky">
        <p class="article-aside__label">In this article</p>
        <nav class="article-toc" id="articleToc"></nav>
        <!-- Author actions for admin -->
        <div class="article-aside__admin" id="articleAsideAdmin" style="display:none">
          <hr class="divider" />
          <a href="#" class="btn btn--ghost btn--sm" id="editArticleBtn" style="width:100%; justify-content:center">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit article
          </a>
          <button class="btn btn--ghost btn--sm" id="deleteArticleBtn" style="width:100%; justify-content:center; color:var(--color-danger)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            Delete
          </button>
        </div>
      </div>
    </aside>
  </div>

</body>
</html>
