<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor — DevArch</title>

  <!-- Styles -->
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../components/navbar/navbar.css" />
  <link rel="stylesheet" href="./editor.css" />

  <!-- Scripts -->
  <script type="module" src="../../scripts/main.js" defer></script>
  <script type="module" src="../../scripts/editor/editor.js"></script>

</head>
<body>
  <div id="navbar-mount"></div>

  <div class="editor-layout">
    <!-- Toolbar -->
    <div class="editor-toolbar" id="editorToolbar">
      <div class="editor-toolbar__left">
        <a href="../home/home.html" class="editor-toolbar__back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </a>
        <span class="editor-toolbar__divider"></span>
        <span class="editor-toolbar__status" id="editorStatus">Draft</span>
      </div>
      <div class="editor-toolbar__right">
        <button class="btn btn--ghost btn--sm" id="previewBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
        <button class="btn btn--primary btn--sm" id="publishBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          <span id="publishBtnText">Publish</span>
        </button>
      </div>
    </div>

    <!-- Editor body -->
    <div class="editor-body">
      <!-- Main editor -->
      <div class="editor-main" id="editorMain">
        <!-- Cover image drop zone -->
        <div class="cover-drop" id="coverDrop">
          <div class="cover-drop__hint" id="coverDropHint">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>Add a cover image</span>
          </div>
          <img class="cover-drop__preview" id="coverPreview" src="" alt="" style="display:none" />
          <input type="file" id="coverInput" accept="image/jpeg,image/png,image/webp" style="display:none" />
        </div>

        <!-- Title -->
        <div
          class="editor-title"
          id="editorTitle"
          contenteditable="true"
          data-placeholder="Article title…"
          spellcheck="true"
        ></div>

        <!-- Format toolbar -->
        <div class="format-bar" id="formatBar">
          <button class="format-btn" data-cmd="bold" title="Bold"><strong>B</strong></button>
          <button class="format-btn" data-cmd="italic" title="Italic"><em>I</em></button>
          <button class="format-btn" data-cmd="underline" title="Underline"><u>U</u></button>
          <div class="format-bar__sep"></div>
          <button class="format-btn" data-cmd="h2" title="Heading 2">H2</button>
          <button class="format-btn" data-cmd="h3" title="Heading 3">H3</button>
          <div class="format-bar__sep"></div>
          <button class="format-btn" data-cmd="insertUnorderedList" title="Bullet list">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg>
          </button>
          <button class="format-btn" data-cmd="insertOrderedList" title="Numbered list">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
          </button>
          <button class="format-btn" data-cmd="blockquote" title="Quote">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
          </button>
          <div class="format-bar__sep"></div>
          <button class="format-btn" data-cmd="createLink" title="Link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
          <button class="format-btn" data-cmd="removeFormat" title="Clear formatting">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/><line x1="3" y1="3" x2="21" y2="21"/></svg>
          </button>
        </div>

        <!-- Rich text body -->
        <div
          class="editor-content prose"
          id="editorContent"
          contenteditable="true"
          data-placeholder="Start writing your article…"
          spellcheck="true"
        ></div>
      </div>

      <!-- Sidebar settings -->
      <aside class="editor-settings">
        <div class="editor-settings__inner">
          <h3 class="editor-settings__heading">Article settings</h3>

          <div class="form-field">
            <label class="form-label" for="categorySelect">Category</label>
            <div class="form-select-wrap">
              <select class="form-select" id="categorySelect">
                <option value="">Select a category…</option>
              </select>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <!-- Image upload -->
          <div class="form-field">
            <label class="form-label">Cover image</label>
            <div class="upload-zone" id="uploadZone">
              <input type="file" id="uploadInput" accept="image/jpeg,image/png,image/webp" style="display:none" />
              <div class="upload-zone__content" id="uploadZoneContent">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
                <p>Drop image or <button type="button" id="uploadTrigger">browse</button></p>
                <span>JPEG, PNG, WebP — max 5 MB</span>
              </div>
              <div class="upload-zone__preview" id="uploadPreview" style="display:none">
                <img id="uploadPreviewImg" src="" alt="" />
                <button class="upload-zone__remove" id="uploadRemove" aria-label="Remove">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>
            </div>
            <p class="upload-progress" id="uploadProgress" style="display:none">
              <span class="upload-progress__bar"><span id="uploadBar"></span></span>
              <span id="uploadProgressText">Uploading…</span>
            </p>
          </div>

          <!-- Excerpt -->
          <div class="form-field">
            <label class="form-label" for="excerptInput">Excerpt <small>(optional)</small></label>
            <textarea class="form-textarea" id="excerptInput" rows="3" placeholder="A short summary shown in article cards…"></textarea>
          </div>

          <!-- Word count -->
          <div class="editor-stats">
            <div class="editor-stat">
              <p class="editor-stat__value" id="wordCount">0</p>
              <p class="editor-stat__label">words</p>
            </div>
            <div class="editor-stat">
              <p class="editor-stat__value" id="readTime">0</p>
              <p class="editor-stat__label">min read</p>
            </div>
            <div class="editor-stat">
              <p class="editor-stat__value" id="charCount">0</p>
              <p class="editor-stat__label">chars</p>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

</body>
</html>
